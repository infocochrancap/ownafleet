<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — OwnaFleet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0B1724; --ink-soft: #2A3647; --muted: #6B7280;
    --line: #D9DDE3; --line-soft: #EEF0F3; --paper: #F8F7F4; --paper-warm: #F2F0EA;
    --accent: #8B6F3F; --accent-deep: #6B5430; --success: #2F5D3D; --warn: #B85C3A;
    --hot: #B85C3A; --warm: #8B6F3F; --review: #6B7280; --unq: #B0B0B0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); font-family: 'Inter', sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }
  nav { background: var(--ink); color: white; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .nav-brand { font-family: 'Fraunces', serif; font-weight: 400; font-size: 14px; letter-spacing: 0.4em; color: white; text-decoration: none; }
  .nav-right { display: flex; align-items: center; gap: 24px; font-size: 12px; }
  .nav-tab { color: rgba(255,255,255,0.6); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; }
  .nav-tab.active, .nav-tab:hover { color: var(--accent); }
  .nav-user { color: rgba(255,255,255,0.6); }
  .signout-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); padding: 6px 14px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-family: inherit; }
  .signout-btn:hover { border-color: var(--accent); color: var(--accent); }

  main { max-width: 1400px; margin: 0 auto; padding: 40px 32px; }
  h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 48px; letter-spacing: -0.02em; margin-bottom: 32px; }

  .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn { background: white; border: 1px solid var(--line); padding: 8px 16px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-family: inherit; color: var(--ink-soft); transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--accent); }
  .filter-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

  .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); margin-bottom: 32px; }
  @media (max-width: 720px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: white; padding: 18px 20px; }
  .stat-label { font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 400; color: var(--ink); letter-spacing: -0.02em; }

  table { width: 100%; background: white; border-collapse: collapse; }
  th { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; text-align: left; padding: 14px 16px; border-bottom: 1px solid var(--line); font-weight: 500; }
  td { padding: 16px; border-bottom: 1px solid var(--line-soft); font-size: 14px; vertical-align: top; }
  tr:hover { background: var(--paper); cursor: pointer; }
  .qual { display: inline-block; padding: 3px 8px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
  .qual-hot { background: rgba(184,92,58,0.12); color: var(--hot); }
  .qual-warm { background: rgba(139,111,63,0.15); color: var(--warm); }
  .qual-needs_review { background: rgba(107,114,128,0.12); color: var(--review); }
  .qual-unqualified { background: rgba(176,176,176,0.18); color: var(--unq); }
  .lead-name { font-weight: 500; color: var(--ink); }
  .lead-email { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .status-select { font-family: inherit; font-size: 12px; padding: 6px 10px; border: 1px solid var(--line); background: white; cursor: pointer; }

  .empty { background: white; padding: 80px 32px; text-align: center; color: var(--muted); }
  .loading { padding: 80px; text-align: center; color: var(--muted); font-size: 14px; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(11,23,36,0.6); display: none; align-items: center; justify-content: center; padding: 32px; z-index: 100; }
  .modal-bg.open { display: flex; }
  .modal { background: white; max-width: 720px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 40px; }
  .modal-close { float: right; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted); }
  .modal h2 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 28px; margin-bottom: 8px; letter-spacing: -0.01em; }
  .modal-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .detail-grid { display: grid; grid-template-columns: 140px 1fr; gap: 12px 24px; padding: 16px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); margin-bottom: 24px; }
  .detail-label { font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
  .detail-value { font-size: 14px; color: var(--ink); }
  .modal-section { margin-top: 24px; }
  .modal-section h3 { font-family: 'Fraunces', serif; font-size: 16px; margin-bottom: 12px; font-weight: 500; }
  .notes-input { width: 100%; padding: 12px 14px; border: 1px solid var(--line); font-family: inherit; font-size: 14px; min-height: 80px; resize: vertical; }
  .save-btn { margin-top: 12px; background: var(--ink); color: white; border: none; padding: 12px 24px; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-family: inherit; }
  .save-btn:hover { background: var(--accent); }
  .history-item { padding: 10px 0; border-bottom: 1px solid var(--line-soft); font-size: 13px; color: var(--ink-soft); }
  .history-item .when { color: var(--muted); font-size: 11px; }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">OWNAFLEET · ADMIN</a>
  <div class="nav-right">
    <a href="/admin" class="nav-tab active">Leads</a>
    <a href="/admin?view=partners" class="nav-tab" id="partnersTab">Partners</a>
    <span class="nav-user" id="userEmail">—</span>
    <button class="signout-btn" id="signoutBtn">Sign out</button>
  </div>
</nav>

<main>
  <h1 id="pageTitle">Leads</h1>

  <div class="stats-row" id="statsRow">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="statTotal">—</div></div>
    <div class="stat"><div class="stat-label">Hot</div><div class="stat-value" id="statHot">—</div></div>
    <div class="stat"><div class="stat-label">In Pipeline</div><div class="stat-value" id="statPipe">—</div></div>
    <div class="stat"><div class="stat-label">Funded</div><div class="stat-value" id="statFunded">—</div></div>
    <div class="stat"><div class="stat-label">Last 7 days</div><div class="stat-value" id="statRecent">—</div></div>
  </div>

  <div class="filters" id="filterBar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="new">New</button>
    <button class="filter-btn" data-filter="contacted">Contacted</button>
    <button class="filter-btn" data-filter="application_sent">Application Sent</button>
    <button class="filter-btn" data-filter="application_started">Application Started</button>
    <button class="filter-btn" data-filter="approved">Approved</button>
    <button class="filter-btn" data-filter="funded">Funded</button>
    <button class="filter-btn" data-filter="closed_won">Closed Won</button>
    <button class="filter-btn" data-filter="dead">Dead</button>
  </div>

  <div id="content"><div class="loading">Loading…</div></div>
</main>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<script type="module">
  import { supabase, getUserRole } from '/shared/supabase.js';

  const STATUSES = ['new','contacted','application_sent','application_started','documents_uploaded','approved','funded','closed_won','dead'];
  const STATUS_LABEL = {
    new: 'New',
    contacted: 'Contacted',
    application_sent: 'Application Sent',
    application_started: 'Application Started',
    documents_uploaded: 'Documents Uploaded',
    approved: 'Approved',
    funded: 'Funded',
    closed_won: 'Closed Won',
    dead: 'Dead'
  };

  // Auth gate
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = '/login'; throw new Error('redirect'); }
  const role = await getUserRole(session.user.id);
  if (role !== 'admin') { window.location.href = '/login'; throw new Error('redirect'); }
  document.getElementById('userEmail').textContent = session.user.email;

  // Get specific role (owner vs operator) — controls UI visibility.
  // If the role column doesn't exist yet (migration not run), default to owner
  // so the dashboard remains fully functional.
  let isOwner = true;
  try {
    const { data: adminRow, error } = await supabase
      .from('admins')
      .select('role')
      .eq('user_id', session.user.id)
      .maybeSingle();
    if (!error && adminRow && adminRow.role) {
      isOwner = adminRow.role === 'owner';
    }
  } catch (e) {
    // Role column missing — leave isOwner=true (backward-compatible)
  }

  if (!isOwner) {
    document.getElementById('partnersTab').style.display = 'none';
  }

  // Sign out
  document.getElementById('signoutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = '/login';
  });

  // Module-level state — declare BEFORE any async call that touches them
  let allLeads = [];
  let currentFilter = 'all';

  // View switcher (leads vs partners)
  const params = new URLSearchParams(window.location.search);
  const view = params.get('view') || 'leads';

  if (view === 'partners') {
    if (!isOwner) {
      // Operators can't access partners view — bounce them back to leads
      window.location.href = '/admin';
      throw new Error('redirect');
    }
    document.getElementById('pageTitle').textContent = 'Referral Partners';
    document.querySelector('.nav-tab.active').classList.remove('active');
    document.getElementById('partnersTab').classList.add('active');
    document.querySelector('.nav-tab[href="/admin"]').classList.remove('active');
    document.getElementById('filterBar').style.display = 'none';
    document.getElementById('statsRow').style.display = 'none';
    await renderPartners();
  } else {
    await loadLeads();
  }

  async function loadLeads() {
    const { data, error } = await supabase
      .from('leads')
      .select('*, referral_partners(first_name, last_name, email, referral_code)')
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('content').innerHTML = `<div class="empty">Error loading leads: ${error.message}</div>`;
      return;
    }
    allLeads = data || [];
    renderStats();
    renderTable();
  }

  function renderStats() {
    const sevenDaysAgo = new Date(Date.now() - 7*24*60*60*1000);
    document.getElementById('statTotal').textContent = allLeads.length;
    document.getElementById('statHot').textContent = allLeads.filter(l => l.qualification === 'hot').length;
    document.getElementById('statPipe').textContent = allLeads.filter(l => ['contacted','application_started','documents_uploaded','approved'].includes(l.status)).length;
    document.getElementById('statFunded').textContent = allLeads.filter(l => ['funded','closed_won'].includes(l.status)).length;
    document.getElementById('statRecent').textContent = allLeads.filter(l => new Date(l.created_at) >= sevenDaysAgo).length;
  }

  function renderTable() {
    const filtered = currentFilter === 'all' ? allLeads : allLeads.filter(l => l.status === currentFilter);
    if (filtered.length === 0) {
      document.getElementById('content').innerHTML = `<div class="empty">No leads in this view.</div>`;
      return;
    }
    const rows = filtered.map(lead => {
      const ref = lead.referral_partners
        ? `${escapeHtml(lead.referral_partners.first_name)} ${escapeHtml(lead.referral_partners.last_name)}`
        : '<span style="color:var(--muted);">Direct</span>';
      return `
        <tr data-id="${lead.id}">
          <td>
            <div class="lead-name">${escapeHtml(lead.first_name)} ${escapeHtml(lead.last_name)}</div>
            <div class="lead-email">${escapeHtml(lead.email)} · ${escapeHtml(lead.phone)}</div>
          </td>
          <td><span class="qual qual-${lead.qualification}">${lead.qualification.replace('_',' ')}</span></td>
          <td>${escapeHtml(lead.equipment_range)}</td>
          <td>${escapeHtml(lead.net_worth)}</td>
          <td>${escapeHtml(lead.liquidity)}</td>
          <td>${ref}</td>
          <td>
            <select class="status-select" data-id="${lead.id}">
              ${STATUSES.map(s => `<option value="${s}" ${s === lead.status ? 'selected' : ''}>${STATUS_LABEL[s]}</option>`).join('')}
            </select>
          </td>
          <td style="font-size:12px;color:var(--muted);">${formatDate(lead.created_at)}</td>
        </tr>
      `;
    }).join('');

    document.getElementById('content').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Lead</th><th>Tier</th><th>Equipment</th><th>Net Worth</th><th>Liquidity</th><th>Source</th><th>Status</th><th>Submitted</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    // Wire row clicks (open modal) — but ignore clicks on the status select
    document.querySelectorAll('tbody tr').forEach(tr => {
      tr.addEventListener('click', (e) => {
        if (e.target.closest('select')) return;
        openModal(tr.dataset.id);
      });
    });

    // Wire status changes
    document.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', async (e) => {
        e.stopPropagation();
        const id = sel.dataset.id;
        const newStatus = sel.value;
        const { error } = await supabase
          .from('leads')
          .update({ status: newStatus, status_updated_by: session.user.id })
          .eq('id', id);
        if (error) {
          alert('Failed to update status: ' + error.message);
          return;
        }
        const lead = allLeads.find(l => l.id === id);
        if (lead) lead.status = newStatus;
        renderStats();

        // Fire-and-forget partner notification (only emails if lead has a partner)
        fetch('/api/notify-status-change', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + session.access_token
          },
          body: JSON.stringify({ lead_id: id, new_status: newStatus })
        }).catch(err => console.warn('Notify failed:', err));
      });
    });
  }

  // Filter clicks
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderTable();
    });
  });

  // Lead detail modal
  async function openModal(leadId) {
    const lead = allLeads.find(l => l.id === leadId);
    if (!lead) return;

    const { data: history } = await supabase
      .from('lead_status_history')
      .select('*')
      .eq('lead_id', leadId)
      .order('changed_at', { ascending: false });

    const ref = lead.referral_partners
      ? `${escapeHtml(lead.referral_partners.first_name)} ${escapeHtml(lead.referral_partners.last_name)} (${escapeHtml(lead.referral_partners.email)})`
      : 'Direct';

    document.getElementById('modalBody').innerHTML = `
      <h2>${escapeHtml(lead.first_name)} ${escapeHtml(lead.last_name)}</h2>
      <div class="modal-sub">Submitted ${formatDate(lead.created_at)} · <span class="qual qual-${lead.qualification}">${lead.qualification.replace('_',' ')}</span></div>
      <div class="detail-grid">
        <div class="detail-label">Email</div><div class="detail-value">${escapeHtml(lead.email)}</div>
        <div class="detail-label">Phone</div><div class="detail-value">${escapeHtml(lead.phone)}</div>
        <div class="detail-label">State</div><div class="detail-value">${escapeHtml(lead.state)}</div>
        <div class="detail-label">Equipment Target</div><div class="detail-value">${escapeHtml(lead.equipment_range)}</div>
        <div class="detail-label">Net Worth</div><div class="detail-value">${escapeHtml(lead.net_worth)}</div>
        <div class="detail-label">Liquidity</div><div class="detail-value">${escapeHtml(lead.liquidity)}</div>
        <div class="detail-label">Source</div><div class="detail-value">${ref}</div>
        ${lead.notes ? `<div class="detail-label">Lead notes</div><div class="detail-value">${escapeHtml(lead.notes)}</div>` : ''}
      </div>

      <div class="modal-section">
        <h3>Next-step actions</h3>
        <p style="font-size:13px;color:var(--ink-soft);margin-bottom:14px;">
          After the intro call, send the credit application link. This emails the lead with the Armada application link and bumps their status to <strong>Application Sent</strong>.
        </p>
        <button class="save-btn" id="sendApplicationBtn" ${lead.status === 'dead' ? 'disabled' : ''}>
          ${lead.status === 'application_sent' || lead.status === 'application_started' || lead.status === 'documents_uploaded' || lead.status === 'approved' || lead.status === 'funded' || lead.status === 'closed_won'
            ? 'Re-send application link'
            : 'Send Armada application →'}
        </button>
      </div>

      <div class="modal-section">
        <h3>Deal economics</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div>
            <label style="font-size:11px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px;">Equipment value (actual)</label>
            <input type="number" id="equipmentValue" class="notes-input" style="min-height:auto;padding:10px 14px;" value="${lead.estimated_equipment_value || ''}" placeholder="e.g. 1200000">
          </div>
          <div>
            <label style="font-size:11px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px;">Total commission (2.1%)</label>
            <input type="number" id="totalCommission" class="notes-input" style="min-height:auto;padding:10px 14px;" value="${lead.estimated_total_commission || ''}" placeholder="auto-calculates from value">
          </div>
        </div>
        <button class="save-btn" id="saveEconomics">Save economics</button>
      </div>

      ${isOwner ? `
      <div class="modal-section">
        <h3>Internal notes (owner only)</h3>
        <textarea class="notes-input" id="internalNotes">${escapeHtml(lead.internal_notes || '')}</textarea>
        <button class="save-btn" id="saveNotes">Save notes</button>
      </div>
      ` : ''}

      <div class="modal-section">
        <h3>Status history</h3>
        ${(history || []).length === 0 ? '<p style="color:var(--muted);font-size:13px;">No changes yet.</p>' :
          (history || []).map(h => `
            <div class="history-item">
              <div>${STATUS_LABEL[h.from_status] || 'New'} → <strong>${STATUS_LABEL[h.to_status]}</strong></div>
              <div class="when">${formatDate(h.changed_at)}</div>
            </div>
          `).join('')
        }
      </div>
    `;

    // Auto-calculate commission when equipment value changes
    const valueInput = document.getElementById('equipmentValue');
    const commissionInput = document.getElementById('totalCommission');
    valueInput.addEventListener('input', () => {
      const v = parseFloat(valueInput.value);
      if (!isNaN(v) && v > 0) commissionInput.value = Math.round(v * 0.021);
    });

    document.getElementById('saveEconomics').addEventListener('click', async () => {
      const value = parseFloat(valueInput.value) || null;
      const commission = parseFloat(commissionInput.value) || null;
      const { error } = await supabase
        .from('leads')
        .update({ estimated_equipment_value: value, estimated_total_commission: commission })
        .eq('id', leadId);
      if (error) {
        alert('Save failed: ' + error.message);
      } else {
        lead.estimated_equipment_value = value;
        lead.estimated_total_commission = commission;
        document.getElementById('saveEconomics').textContent = 'Saved ✓';
        setTimeout(() => { document.getElementById('saveEconomics').textContent = 'Save economics'; }, 1500);
      }
    });

    // Send Armada application button
    document.getElementById('sendApplicationBtn').addEventListener('click', async () => {
      const btn = document.getElementById('sendApplicationBtn');
      const originalText = btn.textContent;
      if (!confirm(`Send the credit application link to ${lead.first_name} ${lead.last_name} (${lead.email})?`)) return;
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        const res = await fetch('/api/send-application', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + session.access_token
          },
          body: JSON.stringify({ lead_id: leadId })
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Failed to send');
        }
        btn.textContent = 'Sent ✓ — status bumped to Application Sent';
        // Refresh local state + status select on the table
        lead.status = 'application_sent';
        renderStats();
        const tableSelect = document.querySelector(`select.status-select[data-id="${leadId}"]`);
        if (tableSelect) tableSelect.value = 'application_sent';
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = 'Re-send application link';
        }, 2500);
      } catch (e) {
        alert('Failed: ' + e.message);
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });

    if (isOwner) {
      document.getElementById('saveNotes').addEventListener('click', async () => {
        const notes = document.getElementById('internalNotes').value;
        const { error } = await supabase.from('leads').update({ internal_notes: notes }).eq('id', leadId);
        if (error) alert('Save failed: ' + error.message);
        else {
          lead.internal_notes = notes;
          document.getElementById('saveNotes').textContent = 'Saved ✓';
          setTimeout(() => { document.getElementById('saveNotes').textContent = 'Save notes'; }, 1500);
        }
      });
    }

    document.getElementById('modalBg').classList.add('open');
  }

  document.getElementById('modalClose').addEventListener('click', () => document.getElementById('modalBg').classList.remove('open'));
  document.getElementById('modalBg').addEventListener('click', (e) => {
    if (e.target.id === 'modalBg') document.getElementById('modalBg').classList.remove('open');
  });

  // Partners view
  async function renderPartners() {
    const { data: partners, error } = await supabase
      .from('referral_partners')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('content').innerHTML = `<div class="empty">Error: ${error.message}</div>`;
      return;
    }
    if (!partners || partners.length === 0) {
      document.getElementById('content').innerHTML = `<div class="empty">No referral partners yet.</div>`;
      return;
    }

    const rows = partners.map(p => `
      <tr>
        <td>
          <div class="lead-name">${escapeHtml(p.first_name)} ${escapeHtml(p.last_name)}</div>
          <div class="lead-email">${escapeHtml(p.email)}</div>
        </td>
        <td>${escapeHtml(p.company || '—')}</td>
        <td><code style="background:var(--paper);padding:3px 8px;font-size:12px;">${escapeHtml(p.referral_code)}</code></td>
        <td>${p.commission_split_pct}%</td>
        <td>
          <select class="status-select" data-id="${p.id}" data-type="partner">
            <option value="pending" ${p.status === 'pending' ? 'selected' : ''}>Pending</option>
            <option value="active" ${p.status === 'active' ? 'selected' : ''}>Active</option>
            <option value="paused" ${p.status === 'paused' ? 'selected' : ''}>Paused</option>
            <option value="rejected" ${p.status === 'rejected' ? 'selected' : ''}>Rejected</option>
          </select>
        </td>
        <td style="font-size:12px;color:var(--muted);">${formatDate(p.created_at)}</td>
      </tr>
    `).join('');

    document.getElementById('content').innerHTML = `
      <table>
        <thead><tr><th>Partner</th><th>Company</th><th>Code</th><th>Split</th><th>Status</th><th>Joined</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    document.querySelectorAll('.status-select[data-type="partner"]').forEach(sel => {
      // Capture previous status so we know whether to fire the approval email
      const previousStatus = sel.value;
      sel.dataset.previousStatus = previousStatus;
      sel.addEventListener('change', async () => {
        const partnerId = sel.dataset.id;
        const prev = sel.dataset.previousStatus;
        const updates = { status: sel.value };
        if (sel.value === 'active') {
          updates.approved_at = new Date().toISOString();
          updates.approved_by = session.user.id;
        }
        const { error } = await supabase.from('referral_partners').update(updates).eq('id', partnerId);
        if (error) {
          alert('Update failed: ' + error.message);
          sel.value = prev;
          return;
        }
        sel.dataset.previousStatus = sel.value;

        // Fire approval email if status moved INTO active from something else
        if (sel.value === 'active' && prev !== 'active') {
          if (!confirm('Send approval email with referral link to this partner?')) return;
          try {
            const res = await fetch('/api/notify-partner-approved', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + session.access_token
              },
              body: JSON.stringify({ partner_id: partnerId })
            });
            if (!res.ok) {
              const data = await res.json().catch(() => ({}));
              alert('Partner approved but email failed: ' + (data.error || 'unknown error'));
            } else {
              alert('Approval email sent ✓');
            }
          } catch (e) {
            alert('Partner approved but email failed: ' + e.message);
          }
        }
      });
    });
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  }
</script>

</body>
</html>
