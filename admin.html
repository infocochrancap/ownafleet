    `;

    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        funnelPeriod = btn.dataset.period;
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderFunnelBody();
      });
    });

    // Pull data once. Try deck_requests with booked_at; if that column doesn't
    // exist yet (migration 008 not run), retry without it and fall back to the
    // source-based booking proxy.
    let deckRes = await supabase
      .from('deck_requests')
      .select('id, email, created_at, source, referral_partner_id, booked_at');
    let bookedAtSupported = true;
    if (deckRes.error && /booked_at/.test(deckRes.error.message || '')) {
      bookedAtSupported = false;
      deckRes = await supabase
        .from('deck_requests')
        .select('id, email, created_at, source, referral_partner_id');
    }

    const [leadsRes, historyRes, partnersRes] = await Promise.all([
      supabase.from('leads').select('id, email, created_at, status, referral_partner_id, estimated_total_commission, referral_partners(id, first_name, last_name, referral_code)'),
      supabase.from('lead_status_history').select('lead_id, to_status, changed_at'),
      supabase.from('referral_partners').select('id, first_name, last_name, referral_code, status')
    ]);

    if (deckRes.error || leadsRes.error || historyRes.error || partnersRes.error) {
      document.getElementById('funnelBody').innerHTML = `<div class="empty">Error loading funnel data.</div>`;
      console.error('Funnel load errors:', deckRes.error, leadsRes.error, historyRes.error, partnersRes.error);
      return;
    }

    funnelData = {
      decks: deckRes.data || [],
      leads: leadsRes.data || [],
      history: historyRes.data || [],
      partners: partnersRes.data || [],
      bookedAtSupported
    };

    renderFunnelBody();
  }

  function renderFunnelBody() {
    if (!funnelData) return;

    // Period cutoff
    const cutoff = funnelPeriod === 'all'
      ? null
      : new Date(Date.now() - Number(funnelPeriod) * 24 * 60 * 60 * 1000);
    const inPeriod = (iso) => !cutoff || new Date(iso) >= cutoff;

    const decks = funnelData.decks.filter(d => inPeriod(d.created_at));
    const leads = funnelData.leads.filter(l => inPeriod(l.created_at));

    // Build a map of lead_id -> max rank ever reached (via current status + history)
    const historyByLead = new Map();
    for (const h of funnelData.history) {
      const r = STAGE_RANK[h.to_status];
      if (r == null) continue;
      const prev = historyByLead.get(h.lead_id) ?? -1;
      if (r > prev) historyByLead.set(h.lead_id, r);
    }

    const leadMaxRank = new Map();
    for (const l of leads) {
      const currentRank = l.status === 'dead' ? -1 : (STAGE_RANK[l.status] ?? 0);
      const historyRank = historyByLead.get(l.id) ?? -1;
      const maxRank = Math.max(currentRank, historyRank, 0);  // every lead is at least 'submitted' (rank 0)
      leadMaxRank.set(l.id, maxRank);
    }

    // ----- Top metrics
    const deckCount = decks.length;
    // Use booked_at when the column exists (migration 008+). Pre-migration,
    // fall back to source='calendly_book' (undercounts re-bookers).
    const bookingCount = funnelData.bookedAtSupported
      ? decks.filter(d => d.booked_at).length
      : decks.filter(d => d.source === 'calendly_book').length;
    const leadCount = leads.length;
    const inPipelineCount = leads.filter(l => {
      const r = leadMaxRank.get(l.id) ?? 0;
      return r >= 1 && r < 7 && l.status !== 'dead';
    }).length;
    const fundedCount = leads.filter(l => (leadMaxRank.get(l.id) ?? 0) >= 7).length;
    const deadCount = leads.filter(l => l.status === 'dead').length;

    // ----- Funnel stage counts (ever-reached)
    const topCount = FUNNEL_STAGES[0] ? leadCount : 0;
    const stageRows = FUNNEL_STAGES.map((stage, i) => {
      const count = leads.filter(l => (leadMaxRank.get(l.id) ?? 0) >= stage.rank).length;
      const pctOfTop = topCount > 0 ? (count / topCount) * 100 : 0;
      const prev = i === 0 ? count : leads.filter(l => (leadMaxRank.get(l.id) ?? 0) >= FUNNEL_STAGES[i-1].rank).length;
      const pctOfPrev = prev > 0 ? (count / prev) * 100 : 0;
      const drop = i === 0 ? null : (100 - pctOfPrev);
      const fillWidth = pctOfTop;
      return `
        <div class="funnel-row">
          <div class="funnel-stage-label">${stage.label}</div>
          <div class="funnel-bar-wrap">
            <div class="funnel-bar-fill ${i === FUNNEL_STAGES.length - 1 ? '' : ''}" style="width: ${fillWidth}%;"></div>
          </div>
          <div class="funnel-count">${count}</div>
          <div class="funnel-pct">${pctOfTop.toFixed(0)}%</div>
          <div class="funnel-pct ${drop == null ? '' : (drop > 50 ? 'drop' : (drop < 25 ? 'good' : ''))}">${drop == null ? '—' : '−' + drop.toFixed(0) + '%'}</div>
        </div>
      `;
    }).join('');

    // ----- Per-partner breakdown
    // Group decks + leads by partner_id (null = Direct)
    const partnerStats = new Map();  // partner_id (string|'direct') -> { name, code, decks, leads, in_pipeline, funded, paid_commission }
    const ensureRow = (key, name, code) => {
      if (!partnerStats.has(key)) {
        partnerStats.set(key, { name, code, decks: 0, leads: 0, in_pipeline: 0, funded: 0, paid_commission: 0 });
      }
      return partnerStats.get(key);
    };
    ensureRow('direct', 'Direct (no partner)', '—');

    for (const d of decks) {
      const key = d.referral_partner_id || 'direct';
      if (key !== 'direct' && !partnerStats.has(key)) {
        const p = funnelData.partners.find(pp => pp.id === key);
        ensureRow(key, p ? `${p.first_name} ${p.last_name}` : 'Unknown', p ? p.referral_code : '—');
      }
      partnerStats.get(key).decks += 1;
    }

    for (const l of leads) {
      const key = l.referral_partner_id || 'direct';
      if (key !== 'direct' && !partnerStats.has(key)) {
        const p = l.referral_partners || funnelData.partners.find(pp => pp.id === key);
        ensureRow(key, p ? `${p.first_name} ${p.last_name}` : 'Unknown', p ? p.referral_code : '—');
      }
      const row = partnerStats.get(key);
      row.leads += 1;
      const r = leadMaxRank.get(l.id) ?? 0;
      if (r >= 7) {
        row.funded += 1;
        row.paid_commission += Number(l.estimated_total_commission || 0);
      } else if (r >= 1 && l.status !== 'dead') {
        row.in_pipeline += 1;
      }
    }

    // Sort: funded desc, then leads desc, then decks desc. Direct row last.
    const partnerRows = Array.from(partnerStats.entries())
      .filter(([k, v]) => v.decks > 0 || v.leads > 0)
      .sort((a, b) => {
        if (a[0] === 'direct') return 1;
        if (b[0] === 'direct') return -1;
        return b[1].funded - a[1].funded || b[1].leads - a[1].leads || b[1].decks - a[1].decks;
      });

    const partnerTable = partnerRows.length === 0
      ? `<div class="empty" style="padding:40px;">No partner activity in this period yet.</div>`
      : `
        <table class="partner-funnel-table">
          <thead>
            <tr>
              <th>Partner</th>
              <th>Deck requests</th>
              <th>Lead submissions</th>
              <th>In pipeline</th>
              <th>Funded</th>
              <th>Est. commission</th>
            </tr>
          </thead>
          <tbody>
            ${partnerRows.map(([key, r]) => `
              <tr>
                <td>
                  <div class="partner-name">${escapeHtml(r.name)}</div>
                  ${r.code !== '—' ? `<div class="partner-code">${escapeHtml(r.code)}</div>` : ''}
                </td>
                <td>${r.decks}</td>
                <td>${r.leads}</td>
                <td>${r.in_pipeline}</td>
                <td>${r.funded}</td>
                <td>${r.paid_commission > 0 ? '$' + Math.round(r.paid_commission).toLocaleString() : '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

    // ----- Compose
    document.getElementById('funnelBody').innerHTML = `
      <div class="stats-row" style="display: grid;">
        <div class="stat"><div class="stat-label">Deck requests</div><div class="stat-value">${deckCount}</div></div>
        <div class="stat"><div class="stat-label">Bookings*</div><div class="stat-value">${bookingCount}</div></div>
        <div class="stat"><div class="stat-label">Lead submissions</div><div class="stat-value">${leadCount}</div></div>
        <div class="stat"><div class="stat-label">In pipeline</div><div class="stat-value">${inPipelineCount}</div></div>
        <div class="stat"><div class="stat-label">Funded</div><div class="stat-value" style="color: var(--accent);">${fundedCount}</div></div>
      </div>

      <div class="funnel-stages">
        <h3>Lead funnel</h3>
        <p class="funnel-sub">Every lead's furthest stage reached. Dead leads still count at their last-reached stage.</p>
        <div class="funnel-header">
          <div>Stage</div>
          <div class="funnel-bar-h">% of top</div>
          <div class="r">Count</div>
          <div class="r">% of top</div>
          <div class="r">Drop from prev</div>
        </div>
        ${stageRows}
        ${deadCount > 0 ? `<p class="funnel-note">${deadCount} lead${deadCount === 1 ? '' : 's'} marked dead in this period (included at last-reached stage above).</p>` : ''}
        <p class="funnel-note">* Bookings = ${funnelData.bookedAtSupported
          ? 'deck requesters who booked a Calendly call (tracked via booked_at on deck_requests).'
          : 'new Calendly bookings that auto-generated a deck request. Undercounts users who requested the deck first and then booked. Run migration 008 to tighten.'}</p>
      </div>

      <h3 style="font-family: 'Fraunces', serif; font-weight: 400; font-size: 22px; margin-bottom: 16px; letter-spacing: -0.01em;">By partner</h3>
      ${partnerTable}
    `;
  }

  // ============================================================
  // INTERACTIONS VIEW
  // ============================================================
  // One row per touchpoint; we group by email in the UI so each
  // prospect shows up once with their latest activity. Engagement
  // status comes from cross-referencing deck_requests + leads.

  async function renderInteractions() {
    document.getElementById('content').innerHTML = `
      <div class="ix-form-card">
        <h3>Log a new interaction</h3>
        <div class="ix-form-grid">
          <label>
            <span class="lbl">Direction *</span>
            <select id="ixDirection">
              <option value="outbound">Outbound (we reached out)</option>
              <option value="inbound">Inbound (they reached out)</option>
            </select>
          </label>
          <label>
            <span class="lbl">Method *</span>
            <select id="ixMethod">
              <option value="email">Email</option>
              <option value="text">Text</option>
              <option value="phone">Phone</option>
              <option value="video_call">Video call</option>
              <option value="linkedin">LinkedIn</option>
              <option value="in_person">In person</option>
              <option value="other">Other</option>
            </select>
          </label>
          <label>
            <span class="lbl">First name</span>
            <input type="text" id="ixFirstName" autocomplete="off">
          </label>
          <label>
            <span class="lbl">Last name</span>
            <input type="text" id="ixLastName" autocomplete="off">
          </label>
          <label>
            <span class="lbl">Email</span>
            <input type="email" id="ixEmail" autocomplete="off">
          </label>
          <label>
            <span class="lbl">Phone</span>
            <input type="tel" id="ixPhone" autocomplete="off">
          </label>
          <label>
            <span class="lbl">Subject / label</span>
            <input type="text" id="ixSubject" autocomplete="off" placeholder="e.g. Intro email">
          </label>
          <label>
            <span class="lbl">Referral source</span>
            <input type="text" id="ixReferralSource" autocomplete="off" placeholder="e.g. Tim B intro">
          </label>
        </div>
        <span class="lbl">Notes</span>
        <textarea id="ixNotes" placeholder="What was discussed, agreed, or asked for…"></textarea>
        <div class="ix-submit-row">
          <button class="save-btn" id="ixSubmit">Log interaction</button>
          <span class="ix-submit-msg" id="ixMsg"></span>
        </div>
      </div>

      <div id="ixListContainer"><div class="loading">Loading…</div></div>
    `;

    document.getElementById('ixSubmit').addEventListener('click', submitInteractionForm);

    await loadInteractions();
  }

  async function loadInteractions() {
    const [interactionsRes, decksRes, leadsRes] = await Promise.all([
      supabase.from('prospect_interactions').select('*').order('logged_at', { ascending: false }),
      supabase.from('deck_requests').select('email, booked_at, created_at'),
      supabase.from('leads').select('email, status')
    ]);

    if (interactionsRes.error) {
      document.getElementById('ixListContainer').innerHTML = `<div class="empty">Error: ${escapeHtml(interactionsRes.error.message)}</div>`;
      return;
    }

    ixData = {
      interactions: interactionsRes.data || [],
      decks: decksRes.data || [],
      leads: leadsRes.data || []
    };

    renderInteractionsList();
  }

  function renderInteractionsList() {
    if (!ixData) return;
    const { interactions, decks, leads } = ixData;

    // Build engagement lookup by email (lowercased)
    const deckByEmail = new Map();
    for (const d of decks) {
      if (!d.email) continue;
      const key = d.email.toLowerCase();
      const existing = deckByEmail.get(key);
      if (!existing || (d.booked_at && !existing.booked_at)) {
        deckByEmail.set(key, d);
      }
    }
    const leadByEmail = new Map();
    for (const l of leads) {
      if (!l.email) continue;
      const key = l.email.toLowerCase();
      const existing = leadByEmail.get(key);
      if (!existing || statusRank(l.status) > statusRank(existing.status)) {
        leadByEmail.set(key, l);
      }
    }

    // Group interactions by email (lowercased) — primary identity key
    const byProspect = new Map();
    for (const ix of interactions) {
      const key = (ix.email || ix.phone || ix.id).toLowerCase();
      if (!byProspect.has(key)) {
        byProspect.set(key, {
          identity: {
            first_name: ix.first_name,
            last_name: ix.last_name,
            email: ix.email,
            phone: ix.phone
          },
          interactions: [],
          latest: null
        });
      }
      const group = byProspect.get(key);
      group.interactions.push(ix);
      if (!group.latest || new Date(ix.logged_at) > new Date(group.latest.logged_at)) {
        group.latest = ix;
        // Prefer the most-recent non-empty identity fields
        if (ix.first_name) group.identity.first_name = ix.first_name;
        if (ix.last_name) group.identity.last_name = ix.last_name;
        if (ix.email) group.identity.email = ix.email;
        if (ix.phone) group.identity.phone = ix.phone;
      }
    }

    // Compute engagement status per prospect
    const now = Date.now();
    const STALE_DAYS = 7;
    for (const group of byProspect.values()) {
      const email = (group.identity.email || '').toLowerCase();
      const lead = leadByEmail.get(email);
      const deck = deckByEmail.get(email);
      const days = Math.floor((now - new Date(group.latest.logged_at).getTime()) / (24*60*60*1000));

      if (lead && statusRank(lead.status) >= 2) {
        group.status = 'applied';     // they're in the lead pipeline at app_sent+
        group.statusLabel = 'Applied';
      } else if (deck && deck.booked_at) {
        group.status = 'booked';
        group.statusLabel = 'Booked';
      } else if (deck || lead) {
        group.status = 'engaged';
        group.statusLabel = 'Engaged';
      } else if (days >= STALE_DAYS) {
        group.status = 'stale';
        group.statusLabel = `Stale (${days}d)`;
      } else {
        group.status = 'recent';
        group.statusLabel = days === 0 ? 'Today' : `${days}d ago`;
      }
      group.daysSinceLast = days;
    }

    // Stats
    const groups = Array.from(byProspect.values());
    const counts = {
      total: groups.length,
      stale: groups.filter(g => g.status === 'stale').length,
      engaged: groups.filter(g => ['engaged','booked','applied'].includes(g.status)).length,
      recent: groups.filter(g => g.status === 'recent').length
    };

    // Sort: stale first (needs action), then recent, then engaged tiers
    const PRIORITY = { stale: 0, recent: 1, engaged: 2, booked: 3, applied: 4 };
    groups.sort((a, b) => {
      const ap = PRIORITY[a.status] ?? 99;
      const bp = PRIORITY[b.status] ?? 99;
      if (ap !== bp) return ap - bp;
      return new Date(b.latest.logged_at) - new Date(a.latest.logged_at);
    });

    const tableRows = groups.map(g => {
      const name = [g.identity.first_name, g.identity.last_name].filter(Boolean).join(' ') || '(no name)';
      const contact = g.identity.email || g.identity.phone || '—';
      const last = g.latest;
      const lastSnippet = last.subject || (last.notes ? last.notes.slice(0, 60) + (last.notes.length > 60 ? '…' : '') : '');
      const dirArrow = last.direction === 'outbound' ? '→' : '←';
      return `
        <tr data-key="${escapeHtml(g.identity.email || g.identity.phone || '')}">
          <td>
            <div class="lead-name">${escapeHtml(name)}</div>
            <div class="lead-email">${escapeHtml(contact)}</div>
          </td>
          <td>
            <div><span class="ix-dir-arrow">${dirArrow}</span><span class="ix-method-pill">${escapeHtml(last.method.replace('_',' '))}</span> ${escapeHtml(lastSnippet)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:3px;">${formatDate(last.logged_at)} · ${escapeHtml(last.source.replace('_',' '))}</div>
          </td>
          <td style="text-align:center;">${g.interactions.length}</td>
          <td><span class="ix-status-badge ix-status-${g.status}">${escapeHtml(g.statusLabel)}</span></td>
        </tr>
      `;
    }).join('');

    document.getElementById('ixListContainer').innerHTML = `
      <div class="stats-row" style="display: grid;">
        <div class="stat"><div class="stat-label">Prospects logged</div><div class="stat-value">${counts.total}</div></div>
        <div class="stat"><div class="stat-label">Stale</div><div class="stat-value" style="color:var(--warn);">${counts.stale}</div></div>
        <div class="stat"><div class="stat-label">Recent</div><div class="stat-value">${counts.recent}</div></div>
        <div class="stat"><div class="stat-label">Engaged+</div><div class="stat-value" style="color:var(--accent);">${counts.engaged}</div></div>
        <div class="stat"><div class="stat-label">Total touches</div><div class="stat-value">${interactions.length}</div></div>
      </div>

      ${groups.length === 0
        ? '<div class="empty"><h3 style="font-family:Fraunces,serif;font-weight:400;">No interactions logged yet</h3><p>Log your first warm intro or inbound contact using the form above.</p></div>'
        : `<table class="ix-prospect-table">
            <thead>
              <tr>
                <th>Prospect</th>
                <th>Last touch</th>
                <th style="text-align:center;">#</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>`
      }
    `;

    // Wire row clicks → open history modal
    document.querySelectorAll('.ix-prospect-table tbody tr').forEach(tr => {
      tr.addEventListener('click', () => {
        const key = tr.dataset.key.toLowerCase();
        const group = byProspect.get(key);
        if (group) openInteractionHistory(group);
      });
    });
  }

  function openInteractionHistory(group) {
    const name = [group.identity.first_name, group.identity.last_name].filter(Boolean).join(' ') || '(no name)';
    const rows = group.interactions
      .slice()
      .sort((a, b) => new Date(b.logged_at) - new Date(a.logged_at))
      .map(ix => {
        const dirArrow = ix.direction === 'outbound' ? '→ outbound' : '← inbound';
        return `
          <div class="history-item" style="padding:14px 0;">
            <div style="display:flex;align-items:baseline;gap:10px;font-size:13px;">
              <span style="font-family:'Courier New',monospace;color:var(--accent);font-size:11px;">${dirArrow}</span>
              <strong style="text-transform:capitalize;">${escapeHtml(ix.method.replace('_',' '))}</strong>
              ${ix.subject ? `· <span>${escapeHtml(ix.subject)}</span>` : ''}
            </div>
            ${ix.notes ? `<div style="font-size:13px;color:var(--ink-soft);margin:6px 0;white-space:pre-wrap;">${escapeHtml(ix.notes)}</div>` : ''}
            <div class="when">${formatDate(ix.logged_at)} · ${escapeHtml(ix.source.replace('_',' '))}${ix.referral_source ? ` · ref: ${escapeHtml(ix.referral_source)}` : ''}${ix.external_url ? ` · <a href="${escapeHtml(ix.external_url)}" target="_blank" style="color:var(--accent);">link →</a>` : ''}</div>
          </div>
        `;
      }).join('');

    document.getElementById('modalBody').innerHTML = `
      <h2>${escapeHtml(name)}</h2>
      <div class="modal-sub">
        ${group.identity.email ? escapeHtml(group.identity.email) : ''}
        ${group.identity.email && group.identity.phone ? ' · ' : ''}
        ${group.identity.phone ? escapeHtml(group.identity.phone) : ''}
        · <span class="ix-status-badge ix-status-${group.status}">${escapeHtml(group.statusLabel)}</span>
      </div>
      <div class="modal-section">
        <h3>Interaction history (${group.interactions.length})</h3>
        ${rows}
      </div>
    `;
    document.getElementById('modalBg').classList.add('open');
  }

  async function submitInteractionForm() {
    const btn = document.getElementById('ixSubmit');
    const msg = document.getElementById('ixMsg');
    msg.className = 'ix-submit-msg';
    msg.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const payload = {
      direction: document.getElementById('ixDirection').value,
      method: document.getElementById('ixMethod').value,
      first_name: document.getElementById('ixFirstName').value.trim(),
      last_name: document.getElementById('ixLastName').value.trim(),
      email: document.getElementById('ixEmail').value.trim(),
      phone: document.getElementById('ixPhone').value.trim(),
      subject: document.getElementById('ixSubject').value.trim(),
      notes: document.getElementById('ixNotes').value.trim(),
      referral_source: document.getElementById('ixReferralSource').value.trim(),
      source: 'manual'
    };

    if (!payload.email && !payload.phone) {
      msg.className = 'ix-submit-msg error';
      msg.textContent = 'Email or phone is required.';
      btn.disabled = false;
      btn.textContent = 'Log interaction';
      return;
    }

    try {
      const res = await fetch('/api/log-interaction', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`
        },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Save failed');

      msg.className = 'ix-submit-msg success';
      msg.textContent = 'Logged ✓';
      // Clear the form
      ['ixFirstName','ixLastName','ixEmail','ixPhone','ixSubject','ixNotes','ixReferralSource'].forEach(id => {
        document.getElementById(id).value = '';
      });
      // Refresh the list
      await loadInteractions();
    } catch (err) {
      msg.className = 'ix-submit-msg error';
      msg.textContent = err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Log interaction';
    }
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  }

  // ============================================================
  // Activity feed (status changes + comments, interleaved chronologically)
  // ============================================================
  function renderActivityFeed(history, comments, adminsById, myUserId) {
    const events = [];
    for (const h of (history || [])) {
      events.push({
        type: 'status',
        when: h.changed_at,
        from: h.from_status,
        to: h.to_status,
        by: h.changed_by
      });
    }
    for (const c of (comments || [])) {
      events.push({
        type: 'comment',
        when: c.created_at,
        comment: c,
        by: c.author_id
      });
    }
    events.sort((a, b) => new Date(b.when) - new Date(a.when));

    if (events.length === 0) {
      return '<p style="color:var(--muted);font-size:13px;">No activity yet — be the first to add a comment above.</p>';
    }

    return events.map(e => {
      const authorEmail = e.by && adminsById.get(e.by)?.email;
      const authorName = authorEmail ? authorEmail.split('@')[0] : (e.by ? 'system' : 'system');

      if (e.type === 'status') {
        const fromLabel = STATUS_LABEL[e.from] || (e.from ? e.from : 'New');
        const toLabel   = STATUS_LABEL[e.to]   || e.to;
        const toDesc    = STATUS_DESC[e.to]    || '';
        return `
          <div class="history-item" style="padding:14px 0;border-bottom:1px solid var(--line-soft);">
            <div style="display:flex;align-items:baseline;gap:8px;font-size:13px;">
              <span style="font-family:'Courier New',monospace;color:var(--accent);font-size:11px;">●</span>
              <span style="color:var(--ink-soft);">${escapeHtml(fromLabel)}</span>
              <span style="color:var(--muted);">→</span>
              <strong style="color:var(--ink);">${escapeHtml(toLabel)}</strong>
            </div>
            ${toDesc ? `<div style="font-size:12px;color:var(--muted);margin-top:4px;font-style:italic;padding-left:18px;">${escapeHtml(toDesc)}</div>` : ''}
            <div style="font-size:11px;color:var(--muted);margin-top:4px;padding-left:18px;">${formatDate(e.when)} · status change by ${escapeHtml(authorName)}</div>
          </div>
        `;
      } else {
        const c = e.comment;
        const isMine = c.author_id === myUserId;
        const edited = c.updated_at && c.updated_at !== c.created_at;
        return `
          <div class="history-item" data-comment-id="${escapeHtml(c.id)}" style="padding:14px 0;border-bottom:1px solid var(--line-soft);">
            <div style="display:flex;align-items:baseline;gap:8px;font-size:13px;">
              <span style="font-family:'Courier New',monospace;color:var(--accent-deep);font-size:11px;">▸</span>
              <strong style="color:var(--ink);">${escapeHtml(authorName)}</strong>
              <span style="color:var(--muted);font-size:11px;">${formatDate(e.when)}${edited ? ' · edited' : ''}</span>
            </div>
            <div class="comment-body" style="font-size:14px;color:var(--ink);line-height:1.55;margin-top:6px;padding-left:18px;white-space:pre-wrap;">${escapeHtml(c.comment)}</div>
            ${isMine ? `
              <div style="margin-top:6px;padding-left:18px;display:flex;gap:14px;">
                <a href="#" class="comment-edit-btn" data-comment-id="${escapeHtml(c.id)}" style="font-size:11px;color:var(--accent);text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;">Edit</a>
                <a href="#" class="comment-delete-btn" data-comment-id="${escapeHtml(c.id)}" style="font-size:11px;color:var(--warn);text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;">Delete</a>
              </div>
            ` : ''}
          </div>
        `;
      }
    }).join('');
  }

  function wireCommentActions(leadId, history, adminsById, myUserId) {
    document.querySelectorAll('.comment-edit-btn').forEach(btn => {
      btn.addEventListener('click', async (ev) => {
        ev.preventDefault();
        const id = btn.dataset.commentId;
        const row = document.querySelector(`[data-comment-id="${id}"]`);
        const body = row.querySelector('.comment-body');
        const original = body.innerText;
        const newText = prompt('Edit comment:', original);
        if (newText == null || newText.trim() === original.trim()) return;
        const { error } = await supabase
          .from('lead_comments')
          .update({ comment: newText.trim(), updated_at: new Date().toISOString() })
          .eq('id', id);
        if (error) { alert('Edit failed: ' + error.message); return; }
        // Reload feed
        const { data: freshComments } = await supabase
          .from('lead_comments')
          .select('*')
          .eq('lead_id', leadId)
          .is('deleted_at', null)
          .order('created_at', { ascending: false });
        document.getElementById('activityFeed').innerHTML =
          renderActivityFeed(history, freshComments || [], adminsById, myUserId);
        wireCommentActions(leadId, history, adminsById, myUserId);
      });
    });
    document.querySelectorAll('.comment-delete-btn').forEach(btn => {
      btn.addEventListener('click', async (ev) => {
        ev.preventDefault();
        const id = btn.dataset.commentId;
        if (!confirm('Delete this comment? Can be restored from the database but not from the UI.')) return;
        const { error } = await supabase
          .from('lead_comments')
          .update({ deleted_at: new Date().toISOString() })
          .eq('id', id);
        if (error) { alert('Delete failed: ' + error.message); return; }
        const { data: freshComments } = await supabase
          .from('lead_comments')
          .select('*')
          .eq('lead_id', leadId)
          .is('deleted_at', null)
          .order('created_at', { ascending: false });
        document.getElementById('activityFeed').innerHTML =
          renderActivityFeed(history, freshComments || [], adminsById, myUserId);
        wireCommentActions(leadId, history, adminsById, myUserId);
      });
    });
  }

  function statusRank(status) {
    const RANKS = {
      new: 0, contacted: 1, application_sent: 2, mini_app_submitted: 3,
      full_app_submitted: 4, approved: 5, terms_accepted: 6, funded: 7,
      operating: 8, dead: -1,
      application_started: 3, documents_uploaded: 4, closed_won: 7
    };
    return RANKS[status] ?? 0;
  }
</script>
