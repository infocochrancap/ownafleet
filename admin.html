<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — OwnaFleet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0B1724; --ink-soft: #2A3647; --muted: #6B7280;
    --line: #D9DDE3; --line-soft: #EEF0F3; --paper: #F8F7F4; --paper-warm: #F2F0EA;
    --accent: #8B6F3F; --accent-deep: #6B5430; --success: #2F5D3D; --warn: #B85C3A;
    --hot: #B85C3A; --warm: #8B6F3F; --review: #6B7280; --unq: #B0B0B0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); font-family: 'Inter', sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }
  nav { background: var(--ink); color: white; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .nav-brand { font-family: 'Fraunces', serif; font-weight: 400; font-size: 14px; letter-spacing: 0.4em; color: white; text-decoration: none; }
  .nav-right { display: flex; align-items: center; gap: 24px; font-size: 12px; }
  .nav-tab { color: rgba(255,255,255,0.6); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; }
  .nav-tab.active, .nav-tab:hover { color: var(--accent); }
  .nav-user { color: rgba(255,255,255,0.6); }
  .signout-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); padding: 6px 14px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-family: inherit; }
  .signout-btn:hover { border-color: var(--accent); color: var(--accent); }

  main { max-width: 1400px; margin: 0 auto; padding: 40px 32px; }
  h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 48px; letter-spacing: -0.02em; margin-bottom: 32px; }

  .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn { background: white; border: 1px solid var(--line); padding: 8px 16px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-family: inherit; color: var(--ink-soft); transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--accent); }
  .filter-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

  .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); margin-bottom: 32px; }
  @media (max-width: 720px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: white; padding: 18px 20px; }
  .stat-label { font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 400; color: var(--ink); letter-spacing: -0.02em; }

  table { width: 100%; background: white; border-collapse: collapse; }
  th { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; text-align: left; padding: 14px 16px; border-bottom: 1px solid var(--line); font-weight: 500; }
  td { padding: 16px; border-bottom: 1px solid var(--line-soft); font-size: 14px; vertical-align: top; }
  tr:hover { background: var(--paper); cursor: pointer; }
  .qual { display: inline-block; padding: 3px 8px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
  .qual-hot { background: rgba(184,92,58,0.12); color: var(--hot); }
  .qual-warm { background: rgba(139,111,63,0.15); color: var(--warm); }
  .qual-needs_review { background: rgba(107,114,128,0.12); color: var(--review); }
  .qual-unqualified { background: rgba(176,176,176,0.18); color: var(--unq); }
  .lead-name { font-weight: 500; color: var(--ink); }
  .lead-email { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .status-select { font-family: inherit; font-size: 12px; padding: 6px 10px; border: 1px solid var(--line); background: white; cursor: pointer; }

  .empty { background: white; padding: 80px 32px; text-align: center; color: var(--muted); }
  .loading { padding: 80px; text-align: center; color: var(--muted); font-size: 14px; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(11,23,36,0.6); display: none; align-items: center; justify-content: center; padding: 32px; z-index: 100; }
  .modal-bg.open { display: flex; }
  .modal { background: white; max-width: 720px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 40px; }
  .modal-close { float: right; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted); }
  .modal h2 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 28px; margin-bottom: 8px; letter-spacing: -0.01em; }
  .modal-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .detail-grid { display: grid; grid-template-columns: 140px 1fr; gap: 12px 24px; padding: 16px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); margin-bottom: 24px; }
  .detail-label { font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
  .detail-value { font-size: 14px; color: var(--ink); }
  .modal-section { margin-top: 24px; }
  .modal-section h3 { font-family: 'Fraunces', serif; font-size: 16px; margin-bottom: 12px; font-weight: 500; }
  .notes-input { width: 100%; padding: 12px 14px; border: 1px solid var(--line); font-family: inherit; font-size: 14px; min-height: 80px; resize: vertical; }
  .save-btn { margin-top: 12px; background: var(--ink); color: white; border: none; padding: 12px 24px; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-family: inherit; }
  .save-btn:hover { background: var(--accent); }
  .history-item { padding: 10px 0; border-bottom: 1px solid var(--line-soft); font-size: 13px; color: var(--ink-soft); }
  .history-item .when { color: var(--muted); font-size: 11px; }

  /* Funnel view */
  .period-bar { display: flex; gap: 8px; margin-bottom: 28px; align-items: center; flex-wrap: wrap; }
  .period-bar .period-label { font-size: 10px; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; margin-right: 8px; }
  .period-btn { background: white; border: 1px solid var(--line); padding: 8px 16px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-family: inherit; color: var(--ink-soft); transition: all 0.15s; }
  .period-btn:hover { border-color: var(--accent); }
  .period-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

  .funnel-stages { background: white; border: 1px solid var(--line); padding: 32px; margin-bottom: 32px; }
  .funnel-stages h3 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400; letter-spacing: -0.01em; margin-bottom: 4px; }
  .funnel-stages .funnel-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .funnel-row { display: grid; grid-template-columns: 200px 1fr 80px 90px 90px; gap: 16px; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--line-soft); }
  .funnel-row:last-child { border-bottom: none; }
  .funnel-stage-label { font-size: 13px; color: var(--ink); font-weight: 500; }
  .funnel-bar-wrap { background: var(--paper); height: 24px; position: relative; }
  .funnel-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
  .funnel-bar-fill.muted { background: var(--ink-soft); opacity: 0.35; }
  .funnel-count { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 400; color: var(--ink); text-align: right; }
  .funnel-pct { font-size: 12px; color: var(--muted); text-align: right; font-variant-numeric: tabular-nums; }
  .funnel-pct.drop { color: var(--warn); }
  .funnel-pct.good { color: var(--success); }
  .funnel-header { display: grid; grid-template-columns: 200px 1fr 80px 90px 90px; gap: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--line); margin-bottom: 4px; }
  .funnel-header div { font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; font-weight: 500; }
  .funnel-header div.r { text-align: right; }

  .funnel-note { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 20px; line-height: 1.5; }

  .partner-funnel-table th, .partner-funnel-table td { text-align: right; }
  .partner-funnel-table th:first-child, .partner-funnel-table td:first-child { text-align: left; }
  .partner-funnel-table tr:hover { background: white; cursor: default; }
  .partner-funnel-table .partner-name { font-weight: 500; }
  .partner-funnel-table .partner-code { font-size: 11px; color: var(--muted); font-family: 'Courier New', monospace; margin-top: 2px; }

  @media (max-width: 720px) {
    .funnel-row, .funnel-header { grid-template-columns: 1fr 70px 70px; }
    .funnel-row .funnel-bar-wrap, .funnel-header .funnel-bar-h { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">OWNAFLEET · ADMIN</a>
  <div class="nav-right">
    <a href="/admin" class="nav-tab active">Leads</a>
    <a href="/admin?view=funnel" class="nav-tab" id="funnelTab">Funnel</a>
    <a href="/admin?view=partners" class="nav-tab" id="partnersTab">Partners</a>
    <span class="nav-user" id="userEmail">—</span>
    <button class="signout-btn" id="signoutBtn">Sign out</button>
  </div>
</nav>

<main>
  <h1 id="pageTitle">Leads</h1>

  <div class="stats-row" id="statsRow">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="statTotal">—</div></div>
    <div class="stat"><div class="stat-label">Hot</div><div class="stat-value" id="statHot">—</div></div>
    <div class="stat"><div class="stat-label">In Pipeline</div><div class="stat-value" id="statPipe">—</div></div>
    <div class="stat"><div class="stat-label">Funded</div><div class="stat-value" id="statFunded">—</div></div>
    <div class="stat"><div class="stat-label">Last 7 days</div><div class="stat-value" id="statRecent">—</div></div>
  </div>

  <div class="filters" id="filterBar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="new">New</button>
    <button class="filter-btn" data-filter="contacted">Contacted</button>
    <button class="filter-btn" data-filter="application_sent">App Sent</button>
    <button class="filter-btn" data-filter="mini_app_submitted">Mini App</button>
    <button class="filter-btn" data-filter="full_app_submitted">Full App</button>
    <button class="filter-btn" data-filter="approved">Approved</button>
    <button class="filter-btn" data-filter="terms_accepted">Terms</button>
    <button class="filter-btn" data-filter="funded">Funded</button>
    <button class="filter-btn" data-filter="operating">Operating</button>
    <button class="filter-btn" data-filter="dead">Dead</button>
  </div>

  <div id="content"><div class="loading">Loading…</div></div>
</main>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<script type="module">
  import { supabase, getUserRole } from '/shared/supabase.js';

  const STATUSES = ['new','contacted','application_sent','mini_app_submitted','full_app_submitted','approved','terms_accepted','funded','operating','dead'];
  const STATUS_LABEL = {
    new: 'New',
    contacted: 'Contacted',
    application_sent: 'Application Sent',
    mini_app_submitted: 'Mini App Submitted',
    full_app_submitted: 'Full App Submitted',
    approved: 'Approved',
    terms_accepted: 'Terms Accepted',
    funded: 'Funded',
    operating: 'Operating',
    dead: 'Dead',
    // Legacy values from before migration_006 — only shown if a historical lead
    // is still on one of these. Should not appear in fresh data.
    application_started: 'Application Started (legacy)',
    documents_uploaded: 'Documents Uploaded (legacy)',
    closed_won: 'Closed Won (legacy)'
  };

  // Auth gate
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = '/login'; throw new Error('redirect'); }
  const role = await getUserRole(session.user.id);
  if (role !== 'admin') { window.location.href = '/login'; throw new Error('redirect'); }
  document.getElementById('userEmail').textContent = session.user.email;

  // Get specific role (owner vs operator) — controls UI visibility.
  // If the role column doesn't exist yet (migration not run), default to owner
  // so the dashboard remains fully functional.
  let isOwner = true;
  try {
    const { data: adminRow, error } = await supabase
      .from('admins')
      .select('role')
      .eq('user_id', session.user.id)
      .maybeSingle();
    if (!error && adminRow && adminRow.role) {
      isOwner = adminRow.role === 'owner';
    }
  } catch (e) {
    // Role column missing — leave isOwner=true (backward-compatible)
  }

  if (!isOwner) {
    document.getElementById('partnersTab').style.display = 'none';
  }

  // Sign out
  document.getElementById('signoutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = '/login';
  });

  // Module-level state — declare BEFORE any async call that touches them
  let allLeads = [];
  let currentFilter = 'all';

  // View switcher (leads vs partners)
  const params = new URLSearchParams(window.location.search);
  const view = params.get('view') || 'leads';

  if (view === 'partners') {
    if (!isOwner) {
      // Operators can't access partners view — bounce them back to leads
      window.location.href = '/admin';
      throw new Error('redirect');
    }
    document.getElementById('pageTitle').textContent = 'Referral Partners';
    document.querySelector('.nav-tab.active').classList.remove('active');
    document.getElementById('partnersTab').classList.add('active');
    document.querySelector('.nav-tab[href="/admin"]').classList.remove('active');
    document.getElementById('filterBar').style.display = 'none';
    document.getElementById('statsRow').style.display = 'none';
    await renderPartners();
  } else if (view === 'funnel') {
    document.getElementById('pageTitle').textContent = 'Funnel';
    document.querySelector('.nav-tab.active').classList.remove('active');
    document.getElementById('funnelTab').classList.add('active');
    document.getElementById('filterBar').style.display = 'none';
    document.getElementById('statsRow').style.display = 'none';
    await renderFunnel();
  } else {
    await loadLeads();
  }

  async function loadLeads() {
    const { data, error } = await supabase
      .from('leads')
      .select('*, referral_partners(first_name, last_name, email, referral_code)')
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('content').innerHTML = `<div class="empty">Error loading leads: ${error.message}</div>`;
      return;
    }
    allLeads = data || [];
    renderStats();
    renderTable();
  }

  function renderStats() {
    const sevenDaysAgo = new Date(Date.now() - 7*24*60*60*1000);
    document.getElementById('statTotal').textContent = allLeads.length;
    document.getElementById('statHot').textContent = allLeads.filter(l => l.qualification === 'hot').length;
    document.getElementById('statPipe').textContent = allLeads.filter(l => ['contacted','application_sent','mini_app_submitted','full_app_submitted','approved','terms_accepted'].includes(l.status)).length;
    document.getElementById('statFunded').textContent = allLeads.filter(l => ['funded','operating'].includes(l.status)).length;
    document.getElementById('statRecent').textContent = allLeads.filter(l => new Date(l.created_at) >= sevenDaysAgo).length;
  }

  function renderTable() {
    const filtered = currentFilter === 'all' ? allLeads : allLeads.filter(l => l.status === currentFilter);
    if (filtered.length === 0) {
      document.getElementById('content').innerHTML = `<div class="empty">No leads in this view.</div>`;
      return;
    }
    const rows = filtered.map(lead => {
      const ref = lead.referral_partners
        ? `${escapeHtml(lead.referral_partners.first_name)} ${escapeHtml(lead.referral_partners.last_name)}`
        : '<span style="color:var(--muted);">Direct</span>';
      return `
        <tr data-id="${lead.id}">
          <td>
            <div class="lead-name">${escapeHtml(lead.first_name)} ${escapeHtml(lead.last_name)}</div>
            <div class="lead-email">${escapeHtml(lead.email)} · ${escapeHtml(lead.phone)}</div>
          </td>
          <td><span class="qual qual-${lead.qualification}">${lead.qualification.replace('_',' ')}</span></td>
          <td>${escapeHtml(lead.equipment_range)}</td>
          <td>${escapeHtml(lead.net_worth)}</td>
          <td>${escapeHtml(lead.liquidity)}</td>
          <td>${ref}</td>
          <td>
            <select class="status-select" data-id="${lead.id}">
              ${STATUSES.map(s => `<option value="${s}" ${s === lead.status ? 'selected' : ''}>${STATUS_LABEL[s]}</option>`).join('')}
            </select>
          </td>
          <td style="font-size:12px;color:var(--muted);">${formatDate(lead.created_at)}</td>
        </tr>
      `;
    }).join('');

    document.getElementById('content').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Lead</th><th>Tier</th><th>Equipment</th><th>Net Worth</th><th>Liquidity</th><th>Source</th><th>Status</th><th>Submitted</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    // Wire row clicks (open modal) — but ignore clicks on the status select
    document.querySelectorAll('tbody tr').forEach(tr => {
      tr.addEventListener('click', (e) => {
        if (e.target.closest('select')) return;
        openModal(tr.dataset.id);
      });
    });

    // Wire status changes
    document.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', async (e) => {
        e.stopPropagation();
        const id = sel.dataset.id;
        const newStatus = sel.value;
        const { error } = await supabase
          .from('leads')
          .update({ status: newStatus, status_updated_by: session.user.id })
          .eq('id', id);
        if (error) {
          alert('Failed to update status: ' + error.message);
          return;
        }
        const lead = allLeads.find(l => l.id === id);
        if (lead) lead.status = newStatus;
        renderStats();

        // Fire-and-forget partner notification (only emails if lead has a partner)
        fetch('/api/notify-status-change', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + session.access_token
          },
          body: JSON.stringify({ lead_id: id, new_status: newStatus })
        }).catch(err => console.warn('Notify failed:', err));
      });
    });
  }

  // Filter clicks
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderTable();
    });
  });

  // Lead detail modal
  async function openModal(leadId) {
    const lead = allLeads.find(l => l.id === leadId);
    if (!lead) return;

    const { data: history } = await supabase
      .from('lead_status_history')
      .select('*')
      .eq('lead_id', leadId)
      .order('changed_at', { ascending: false });

    const ref = lead.referral_partners
      ? `${escapeHtml(lead.referral_partners.first_name)} ${escapeHtml(lead.referral_partners.last_name)} (${escapeHtml(lead.referral_partners.email)})`
      : 'Direct';

    document.getElementById('modalBody').innerHTML = `
      <h2>${escapeHtml(lead.first_name)} ${escapeHtml(lead.last_name)}</h2>
      <div class="modal-sub">Submitted ${formatDate(lead.created_at)} · <span class="qual qual-${lead.qualification}">${lead.qualification.replace('_',' ')}</span></div>
      <div class="detail-grid">
        <div class="detail-label">Email</div><div class="detail-value">${escapeHtml(lead.email)}</div>
        <div class="detail-label">Phone</div><div class="detail-value">${escapeHtml(lead.phone)}</div>
        <div class="detail-label">State</div><div class="detail-value">${escapeHtml(lead.state)}</div>
        <div class="detail-label">Equipment Target</div><div class="detail-value">${escapeHtml(lead.equipment_range)}</div>
        <div class="detail-label">Net Worth</div><div class="detail-value">${escapeHtml(lead.net_worth)}</div>
        <div class="detail-label">Liquidity</div><div class="detail-value">${escapeHtml(lead.liquidity)}</div>
        <div class="detail-label">Source</div><div class="detail-value">${ref}</div>
        ${lead.notes ? `<div class="detail-label">Lead notes</div><div class="detail-value">${escapeHtml(lead.notes)}</div>` : ''}
      </div>

      <div class="modal-section">
        <h3>Next-step actions</h3>
        <p style="font-size:13px;color:var(--ink-soft);margin-bottom:14px;">
          Lead hasn't booked a Calendly call within 24 hours? Send a warm follow-up nudge. After the call, send the Armada credit application link.
        </p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <button class="save-btn" id="sendNudgeBtn" ${lead.status === 'dead' ? 'disabled' : ''} style="background: var(--paper); color: var(--ink); border: 1px solid var(--ink);">
            ${lead.status === 'contacted' ? 'Re-send nudge' : 'Send 24-hour nudge'}
          </button>
          <button class="save-btn" id="sendApplicationBtn" ${lead.status === 'dead' ? 'disabled' : ''}>
            ${['application_sent','mini_app_submitted','full_app_submitted','approved','terms_accepted','funded','operating'].includes(lead.status)
              ? 'Re-send application link'
              : 'Send Armada application →'}
          </button>
        </div>
      </div>

      <div class="modal-section">
        <h3>Deal economics</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div>
            <label style="font-size:11px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px;">Equipment value (actual)</label>
            <input type="number" id="equipmentValue" class="notes-input" style="min-height:auto;padding:10px 14px;" value="${lead.estimated_equipment_value || ''}" placeholder="e.g. 1200000">
          </div>
          <div>
            <label style="font-size:11px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px;">Total commission (2.1%)</label>
            <input type="number" id="totalCommission" class="notes-input" style="min-height:auto;padding:10px 14px;" value="${lead.estimated_total_commission || ''}" placeholder="auto-calculates from value">
          </div>
        </div>
        <button class="save-btn" id="saveEconomics">Save economics</button>
      </div>

      ${isOwner ? `
      <div class="modal-section">
        <h3>Internal notes (owner only)</h3>
        <textarea class="notes-input" id="internalNotes">${escapeHtml(lead.internal_notes || '')}</textarea>
        <button class="save-btn" id="saveNotes">Save notes</button>
      </div>
      ` : ''}

      <div class="modal-section">
        <h3>Status history</h3>
        ${(history || []).length === 0 ? '<p style="color:var(--muted);font-size:13px;">No changes yet.</p>' :
          (history || []).map(h => `
            <div class="history-item">
              <div>${STATUS_LABEL[h.from_status] || 'New'} → <strong>${STATUS_LABEL[h.to_status]}</strong></div>
              <div class="when">${formatDate(h.changed_at)}</div>
            </div>
          `).join('')
        }
      </div>

      ${isOwner ? `
      <div class="modal-section" style="border-top: 1px solid var(--line); padding-top: 24px; margin-top: 24px;">
        <h3 style="color: var(--warn);">Danger zone</h3>
        <p style="font-size: 13px; color: var(--ink-soft); margin-bottom: 14px;">
          Permanently delete this lead and its status history. Use for fake / duplicate / test records. <strong>Cannot be undone.</strong>
        </p>
        <button class="save-btn" id="deleteLeadBtn" style="background: var(--warn); color: white;">
          Delete lead permanently
        </button>
      </div>
      ` : ''}
    `;

    // Auto-calculate commission when equipment value changes
    const valueInput = document.getElementById('equipmentValue');
    const commissionInput = document.getElementById('totalCommission');
    valueInput.addEventListener('input', () => {
      const v = parseFloat(valueInput.value);
      if (!isNaN(v) && v > 0) commissionInput.value = Math.round(v * 0.021);
    });

    document.getElementById('saveEconomics').addEventListener('click', async () => {
      const value = parseFloat(valueInput.value) || null;
      const commission = parseFloat(commissionInput.value) || null;
      const { error } = await supabase
        .from('leads')
        .update({ estimated_equipment_value: value, estimated_total_commission: commission })
        .eq('id', leadId);
      if (error) {
        alert('Save failed: ' + error.message);
      } else {
        lead.estimated_equipment_value = value;
        lead.estimated_total_commission = commission;
        document.getElementById('saveEconomics').textContent = 'Saved ✓';
        setTimeout(() => { document.getElementById('saveEconomics').textContent = 'Save economics'; }, 1500);
      }
    });

    // Send 24-hour nudge button — with Calendly pre-check
    document.getElementById('sendNudgeBtn').addEventListener('click', async () => {
      const btn = document.getElementById('sendNudgeBtn');
      const originalText = btn.textContent;
      if (!confirm(`Send the 24-hour follow-up nudge to ${lead.first_name} ${lead.last_name} (${lead.email})?\n\nThis emails them a warm reminder + Calendly link and bumps their status to Contacted.\n\n(We'll first check Calendly to make sure they haven't already booked.)`)) return;

      btn.disabled = true;
      btn.textContent = 'Checking Calendly…';

      const sendRequest = async (force = false) => {
        const res = await fetch('/api/send-nudge', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + session.access_token
          },
          body: JSON.stringify({ lead_id: leadId, force })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Failed to send');
        return data;
      };

      try {
        let result = await sendRequest(false);

        // If Calendly says they've already booked, prompt for override.
        // Format the booking time using the browser's local timezone for readability.
        if (result.requires_confirmation) {
          btn.textContent = 'Awaiting confirmation…';
          const ev = result.event;
          const localTime = new Date(ev.start_time).toLocaleString(undefined, {
            weekday: 'short',
            month: 'short',
            day: 'numeric',
            hour: 'numeric',
            minute: '2-digit',
            timeZoneName: 'short'
          });
          const msg = `⚠ ${result.lead_name} appears to have already booked a Calendly call — "${ev.name}" on ${localTime}. Send the nudge anyway?`;
          const proceed = confirm(msg);
          if (!proceed) {
            btn.disabled = false;
            btn.textContent = originalText;
            return;
          }
          btn.textContent = 'Sending anyway…';
          result = await sendRequest(true);  // retry with force
        }

        if (!result.ok) throw new Error('Unexpected response');

        btn.textContent = 'Sent ✓ — bumped to Contacted';
        lead.status = 'contacted';
        renderStats();
        const tableSelect = document.querySelector(`select.status-select[data-id="${leadId}"]`);
        if (tableSelect) tableSelect.value = 'contacted';
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = 'Re-send nudge';
        }, 2500);
      } catch (e) {
        alert('Failed: ' + e.message);
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });

    // Send Armada application button
    document.getElementById('sendApplicationBtn').addEventListener('click', async () => {
      const btn = document.getElementById('sendApplicationBtn');
      const originalText = btn.textContent;
      if (!confirm(`Send the credit application link to ${lead.first_name} ${lead.last_name} (${lead.email})?`)) return;
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        const res = await fetch('/api/send-application', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + session.access_token
          },
          body: JSON.stringify({ lead_id: leadId })
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Failed to send');
        }
        btn.textContent = 'Sent ✓ — status bumped to Application Sent';
        // Refresh local state + status select on the table
        lead.status = 'application_sent';
        renderStats();
        const tableSelect = document.querySelector(`select.status-select[data-id="${leadId}"]`);
        if (tableSelect) tableSelect.value = 'application_sent';
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = 'Re-send application link';
        }, 2500);
      } catch (e) {
        alert('Failed: ' + e.message);
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });

    if (isOwner) {
      document.getElementById('saveNotes').addEventListener('click', async () => {
        const notes = document.getElementById('internalNotes').value;
        const { error } = await supabase.from('leads').update({ internal_notes: notes }).eq('id', leadId);
        if (error) alert('Save failed: ' + error.message);
        else {
          lead.internal_notes = notes;
          document.getElementById('saveNotes').textContent = 'Saved ✓';
          setTimeout(() => { document.getElementById('saveNotes').textContent = 'Save notes'; }, 1500);
        }
      });

      // Danger-zone: permanently delete this lead
      document.getElementById('deleteLeadBtn').addEventListener('click', async () => {
        const fullName = `${lead.first_name} ${lead.last_name}`;
        const confirmed = confirm(
          `Permanently delete ${fullName} (${lead.email})?\n\n` +
          `This deletes the lead AND its status history. It cannot be undone.`
        );
        if (!confirmed) return;

        const btn = document.getElementById('deleteLeadBtn');
        btn.disabled = true;
        btn.textContent = 'Deleting…';

        const { error } = await supabase.from('leads').delete().eq('id', leadId);
        if (error) {
          alert('Delete failed: ' + error.message);
          btn.disabled = false;
          btn.textContent = 'Delete lead permanently';
          return;
        }

        // Remove from local state + re-render
        allLeads = allLeads.filter(l => l.id !== leadId);
        renderStats();
        renderTable();

        // Close the modal
        document.getElementById('modalBg').classList.remove('open');
      });
    }

    document.getElementById('modalBg').classList.add('open');
  }

  document.getElementById('modalClose').addEventListener('click', () => document.getElementById('modalBg').classList.remove('open'));
  document.getElementById('modalBg').addEventListener('click', (e) => {
    if (e.target.id === 'modalBg') document.getElementById('modalBg').classList.remove('open');
  });

  // Partners view
  async function renderPartners() {
    const { data: partners, error } = await supabase
      .from('referral_partners')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('content').innerHTML = `<div class="empty">Error: ${error.message}</div>`;
      return;
    }
    if (!partners || partners.length === 0) {
      document.getElementById('content').innerHTML = `<div class="empty">No referral partners yet.</div>`;
      return;
    }

    const rows = partners.map(p => `
      <tr>
        <td>
          <div class="lead-name">${escapeHtml(p.first_name)} ${escapeHtml(p.last_name)}</div>
          <div class="lead-email">${escapeHtml(p.email)}</div>
        </td>
        <td>${escapeHtml(p.company || '—')}</td>
        <td><code style="background:var(--paper);padding:3px 8px;font-size:12px;">${escapeHtml(p.referral_code)}</code></td>
        <td>${p.commission_split_pct}%</td>
        <td>
          <select class="status-select" data-id="${p.id}" data-type="partner">
            <option value="pending" ${p.status === 'pending' ? 'selected' : ''}>Pending</option>
            <option value="active" ${p.status === 'active' ? 'selected' : ''}>Active</option>
            <option value="paused" ${p.status === 'paused' ? 'selected' : ''}>Paused</option>
            <option value="rejected" ${p.status === 'rejected' ? 'selected' : ''}>Rejected</option>
          </select>
        </td>
        <td style="font-size:12px;color:var(--muted);">${formatDate(p.created_at)}</td>
      </tr>
    `).join('');

    document.getElementById('content').innerHTML = `
      <table>
        <thead><tr><th>Partner</th><th>Company</th><th>Code</th><th>Split</th><th>Status</th><th>Joined</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    document.querySelectorAll('.status-select[data-type="partner"]').forEach(sel => {
      // Capture previous status so we know whether to fire the approval email
      const previousStatus = sel.value;
      sel.dataset.previousStatus = previousStatus;
      sel.addEventListener('change', async () => {
        const partnerId = sel.dataset.id;
        const prev = sel.dataset.previousStatus;
        const updates = { status: sel.value };
        if (sel.value === 'active') {
          updates.approved_at = new Date().toISOString();
          updates.approved_by = session.user.id;
        }
        const { error } = await supabase.from('referral_partners').update(updates).eq('id', partnerId);
        if (error) {
          alert('Update failed: ' + error.message);
          sel.value = prev;
          return;
        }
        sel.dataset.previousStatus = sel.value;

        // Fire approval email if status moved INTO active from something else
        if (sel.value === 'active' && prev !== 'active') {
          if (!confirm('Send approval email with referral link to this partner?')) return;
          try {
            const res = await fetch('/api/notify-partner-approved', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + session.access_token
              },
              body: JSON.stringify({ partner_id: partnerId })
            });
            if (!res.ok) {
              const data = await res.json().catch(() => ({}));
              alert('Partner approved but email failed: ' + (data.error || 'unknown error'));
            } else {
              alert('Approval email sent ✓');
            }
          } catch (e) {
            alert('Partner approved but email failed: ' + e.message);
          }
        }
      });
    });
  }

  // ============================================================
  // FUNNEL VIEW
  // ============================================================
  // Stage ranks: monotonic forward progression. 'dead' is excluded.
  // For each lead we compute the max rank they ever reached
  // (current status + lead_status_history.to_status), so a lead that
  // got to mini-app and then died still counts as having reached mini-app.
  const STAGE_RANK = {
    new: 0, contacted: 1, application_sent: 2, mini_app_submitted: 3,
    full_app_submitted: 4, approved: 5, terms_accepted: 6, funded: 7, operating: 8,
    // legacy aliases
    application_started: 3, documents_uploaded: 4, closed_won: 7
  };
  const FUNNEL_STAGES = [
    { key: 'submitted', label: 'Lead submitted', rank: 0 },
    { key: 'contacted', label: 'Contacted', rank: 1 },
    { key: 'application_sent', label: 'Application sent', rank: 2 },
    { key: 'mini_app_submitted', label: 'Mini app submitted', rank: 3 },
    { key: 'full_app_submitted', label: 'Full app submitted', rank: 4 },
    { key: 'approved', label: 'Approved', rank: 5 },
    { key: 'terms_accepted', label: 'Terms accepted', rank: 6 },
    { key: 'funded', label: 'Funded', rank: 7 },
    { key: 'operating', label: 'Operating', rank: 8 }
  ];

  let funnelData = null;  // cached after first load
  let funnelPeriod = '30';  // days; 'all' = no filter

  async function renderFunnel() {
    document.getElementById('content').innerHTML = `
      <div class="period-bar">
        <span class="period-label">Period</span>
        <button class="period-btn" data-period="7">Last 7d</button>
        <button class="period-btn active" data-period="30">Last 30d</button>
        <button class="period-btn" data-period="90">Last 90d</button>
        <button class="period-btn" data-period="all">All time</button>
      </div>
      <div id="funnelBody"><div class="loading">Loading…</div></div>
    `;

    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        funnelPeriod = btn.dataset.period;
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderFunnelBody();
      });
    });

    // Pull data once
    const [deckRes, leadsRes, historyRes, partnersRes] = await Promise.all([
      supabase.from('deck_requests').select('id, email, created_at, source, referral_partner_id'),
      supabase.from('leads').select('id, email, created_at, status, referral_partner_id, estimated_total_commission, referral_partners(id, first_name, last_name, referral_code)'),
      supabase.from('lead_status_history').select('lead_id, to_status, changed_at'),
      supabase.from('referral_partners').select('id, first_name, last_name, referral_code, status')
    ]);

    if (deckRes.error || leadsRes.error || historyRes.error || partnersRes.error) {
      document.getElementById('funnelBody').innerHTML = `<div class="empty">Error loading funnel data.</div>`;
      console.error('Funnel load errors:', deckRes.error, leadsRes.error, historyRes.error, partnersRes.error);
      return;
    }

    funnelData = {
      decks: deckRes.data || [],
      leads: leadsRes.data || [],
      history: historyRes.data || [],
      partners: partnersRes.data || []
    };

    renderFunnelBody();
  }

  function renderFunnelBody() {
    if (!funnelData) return;

    // Period cutoff
    const cutoff = funnelPeriod === 'all'
      ? null
      : new Date(Date.now() - Number(funnelPeriod) * 24 * 60 * 60 * 1000);
    const inPeriod = (iso) => !cutoff || new Date(iso) >= cutoff;

    const decks = funnelData.decks.filter(d => inPeriod(d.created_at));
    const leads = funnelData.leads.filter(l => inPeriod(l.created_at));

    // Build a map of lead_id -> max rank ever reached (via current status + history)
    const historyByLead = new Map();
    for (const h of funnelData.history) {
      const r = STAGE_RANK[h.to_status];
      if (r == null) continue;
      const prev = historyByLead.get(h.lead_id) ?? -1;
      if (r > prev) historyByLead.set(h.lead_id, r);
    }

    const leadMaxRank = new Map();
    for (const l of leads) {
      const currentRank = l.status === 'dead' ? -1 : (STAGE_RANK[l.status] ?? 0);
      const historyRank = historyByLead.get(l.id) ?? -1;
      const maxRank = Math.max(currentRank, historyRank, 0);  // every lead is at least 'submitted' (rank 0)
      leadMaxRank.set(l.id, maxRank);
    }

    // ----- Top metrics
    const deckCount = decks.length;
    const bookingCount = decks.filter(d => d.source === 'calendly_book').length;
    const leadCount = leads.length;
    const inPipelineCount = leads.filter(l => {
      const r = leadMaxRank.get(l.id) ?? 0;
      return r >= 1 && r < 7 && l.status !== 'dead';
    }).length;
    const fundedCount = leads.filter(l => (leadMaxRank.get(l.id) ?? 0) >= 7).length;
    const deadCount = leads.filter(l => l.status === 'dead').length;

    // ----- Funnel stage counts (ever-reached)
    const topCount = FUNNEL_STAGES[0] ? leadCount : 0;
    const stageRows = FUNNEL_STAGES.map((stage, i) => {
      const count = leads.filter(l => (leadMaxRank.get(l.id) ?? 0) >= stage.rank).length;
      const pctOfTop = topCount > 0 ? (count / topCount) * 100 : 0;
      const prev = i === 0 ? count : leads.filter(l => (leadMaxRank.get(l.id) ?? 0) >= FUNNEL_STAGES[i-1].rank).length;
      const pctOfPrev = prev > 0 ? (count / prev) * 100 : 0;
      const drop = i === 0 ? null : (100 - pctOfPrev);
      const fillWidth = pctOfTop;
      return `
        <div class="funnel-row">
          <div class="funnel-stage-label">${stage.label}</div>
          <div class="funnel-bar-wrap">
            <div class="funnel-bar-fill ${i === FUNNEL_STAGES.length - 1 ? '' : ''}" style="width: ${fillWidth}%;"></div>
          </div>
          <div class="funnel-count">${count}</div>
          <div class="funnel-pct">${pctOfTop.toFixed(0)}%</div>
          <div class="funnel-pct ${drop == null ? '' : (drop > 50 ? 'drop' : (drop < 25 ? 'good' : ''))}">${drop == null ? '—' : '−' + drop.toFixed(0) + '%'}</div>
        </div>
      `;
    }).join('');

    // ----- Per-partner breakdown
    // Group decks + leads by partner_id (null = Direct)
    const partnerStats = new Map();  // partner_id (string|'direct') -> { name, code, decks, leads, in_pipeline, funded, paid_commission }
    const ensureRow = (key, name, code) => {
      if (!partnerStats.has(key)) {
        partnerStats.set(key, { name, code, decks: 0, leads: 0, in_pipeline: 0, funded: 0, paid_commission: 0 });
      }
      return partnerStats.get(key);
    };
    ensureRow('direct', 'Direct (no partner)', '—');

    for (const d of decks) {
      const key = d.referral_partner_id || 'direct';
      if (key !== 'direct' && !partnerStats.has(key)) {
        const p = funnelData.partners.find(pp => pp.id === key);
        ensureRow(key, p ? `${p.first_name} ${p.last_name}` : 'Unknown', p ? p.referral_code : '—');
      }
      partnerStats.get(key).decks += 1;
    }

    for (const l of leads) {
      const key = l.referral_partner_id || 'direct';
      if (key !== 'direct' && !partnerStats.has(key)) {
        const p = l.referral_partners || funnelData.partners.find(pp => pp.id === key);
        ensureRow(key, p ? `${p.first_name} ${p.last_name}` : 'Unknown', p ? p.referral_code : '—');
      }
      const row = partnerStats.get(key);
      row.leads += 1;
      const r = leadMaxRank.get(l.id) ?? 0;
      if (r >= 7) {
        row.funded += 1;
        row.paid_commission += Number(l.estimated_total_commission || 0);
      } else if (r >= 1 && l.status !== 'dead') {
        row.in_pipeline += 1;
      }
    }

    // Sort: funded desc, then leads desc, then decks desc. Direct row last.
    const partnerRows = Array.from(partnerStats.entries())
      .filter(([k, v]) => v.decks > 0 || v.leads > 0)
      .sort((a, b) => {
        if (a[0] === 'direct') return 1;
        if (b[0] === 'direct') return -1;
        return b[1].funded - a[1].funded || b[1].leads - a[1].leads || b[1].decks - a[1].decks;
      });

    const partnerTable = partnerRows.length === 0
      ? `<div class="empty" style="padding:40px;">No partner activity in this period yet.</div>`
      : `
        <table class="partner-funnel-table">
          <thead>
            <tr>
              <th>Partner</th>
              <th>Deck requests</th>
              <th>Lead submissions</th>
              <th>In pipeline</th>
              <th>Funded</th>
              <th>Est. commission</th>
            </tr>
          </thead>
          <tbody>
            ${partnerRows.map(([key, r]) => `
              <tr>
                <td>
                  <div class="partner-name">${escapeHtml(r.name)}</div>
                  ${r.code !== '—' ? `<div class="partner-code">${escapeHtml(r.code)}</div>` : ''}
                </td>
                <td>${r.decks}</td>
                <td>${r.leads}</td>
                <td>${r.in_pipeline}</td>
                <td>${r.funded}</td>
                <td>${r.paid_commission > 0 ? '$' + Math.round(r.paid_commission).toLocaleString() : '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

    // ----- Compose
    document.getElementById('funnelBody').innerHTML = `
      <div class="stats-row" style="display: grid;">
        <div class="stat"><div class="stat-label">Deck requests</div><div class="stat-value">${deckCount}</div></div>
        <div class="stat"><div class="stat-label">Bookings*</div><div class="stat-value">${bookingCount}</div></div>
        <div class="stat"><div class="stat-label">Lead submissions</div><div class="stat-value">${leadCount}</div></div>
        <div class="stat"><div class="stat-label">In pipeline</div><div class="stat-value">${inPipelineCount}</div></div>
        <div class="stat"><div class="stat-label">Funded</div><div class="stat-value" style="color: var(--accent);">${fundedCount}</div></div>
      </div>

      <div class="funnel-stages">
        <h3>Lead funnel</h3>
        <p class="funnel-sub">Every lead's furthest stage reached. Dead leads still count at their last-reached stage.</p>
        <div class="funnel-header">
          <div>Stage</div>
          <div class="funnel-bar-h">% of top</div>
          <div class="r">Count</div>
          <div class="r">% of top</div>
          <div class="r">Drop from prev</div>
        </div>
        ${stageRows}
        ${deadCount > 0 ? `<p class="funnel-note">${deadCount} lead${deadCount === 1 ? '' : 's'} marked dead in this period (included at last-reached stage above).</p>` : ''}
        <p class="funnel-note">* Bookings = new Calendly bookings that auto-generated a deck request. Undercounts users who requested the deck first and then booked.</p>
      </div>

      <h3 style="font-family: 'Fraunces', serif; font-weight: 400; font-size: 22px; margin-bottom: 16px; letter-spacing: -0.01em;">By partner</h3>
      ${partnerTable}
    `;
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  }
</script>
